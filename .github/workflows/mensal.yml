name: Atualizar dados de famílias

# Agenda: executa no primeiro dia de cada mês às 00:00 UTC
on:
  schedule:
    - cron: '0 0 1 * *'
  # Permite executar manualmente pela interface do GitHub
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permissão para fazer push no repositório

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: 🚀 Executar script de coleta
        run: python scripts/fetch_families.py

      - name: ✅ Verificar se houve mudanças e fazer commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dados/familias.csv
          # Se houver diferenças, commita e faz push
          if git diff --staged --quiet; then
            echo "Nenhuma alteração detectada. Nada a commitar."
          else
            git commit -m "Atualização mensal automática dos dados de famílias [skip ci]"
            git push
          fi
